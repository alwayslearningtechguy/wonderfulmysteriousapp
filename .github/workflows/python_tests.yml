name: CI

on:
  push:
  pull_request:

jobs:

  # ============================================================
  # Job 1 — Unit + Integration Tests + Docker Build
  # Unchanged from original. All other jobs depend on this.
  # ============================================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit + integration tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest tests/unit tests/integration -v

      - name: Build Docker image
        run: docker build -t wonderfulapp .


  # ============================================================
  # Job 2 — E2E Tests (unchanged from original)
  # ============================================================
  e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Start FastAPI app
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Run E2E tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest tests/e2e -v


  # ============================================================
  # Job 3 — Security Tests
  #
  # 3a. Dependency vulnerability scan (pip-audit)
  # 3b. Static analysis (Bandit)
  # 3c. Security header + input validation tests (pytest, no server needed)
  # 3d. OWASP ZAP baseline scan (passive, against live server)
  # ============================================================
  security-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      issues: write
      actions: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pip-audit bandit

      # 3a — Dependency vulnerability scan
      - name: Scan dependencies for known vulnerabilities
        run: pip-audit -r requirements.txt
        continue-on-error: false

      # 3b — Static security analysis
      - name: Run Bandit static analysis
        run: |
          bandit -r app/ -ll -ii --exit-zero \
            --format txt \
            --output bandit-report.txt
          cat bandit-report.txt
          bandit -r app/ -lll -iii

      # 3c — Security header and input tests (TestClient, no server needed)
      - name: Run security header and input tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest tests/specialized/security/ -v

      # 3d — Start app for OWASP ZAP scan
      - name: Start FastAPI app for ZAP scan
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      # 3d — OWASP ZAP passive baseline scan
      # Passive scan only — does not send attack payloads, safe for CI.
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:8000"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-I"
          artifact_name: zap-baseline-report
        continue-on-error: true  # Report uploaded; review manually on first run

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.txt
            report_html.html
            report_json.json
          retention-days: 30


  # ============================================================
  # Job 4 — Performance / Load Tests (Locust)
  #
  # Runs a 30-second load test with 10 concurrent users.
  # Fails if p95 > 200ms or error rate > 1%.
  # CSV results are uploaded as an artifact for trend tracking.
  # ============================================================
  performance-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install locust

      - name: Start FastAPI app
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Verify app is running
        run: curl -f http://localhost:8000/api/weather

      - name: Create results directory
        run: mkdir -p results

      - name: Run Locust load test
        run: |
          locust \
            -f tests/specialized/performance/locustfile.py \
            --host http://localhost:8000 \
            --users 10 \
            --spawn-rate 2 \
            --run-time 30s \
            --headless \
            --csv=results/locust \
            --html=results/locust_report.html
        # Note: exit code 1 from the quitting hook will fail this step
        # if performance targets are not met.

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: results/
          retention-days: 30


  # ============================================================
  # Job 5 — Cross-Browser + Accessibility Tests (Playwright)
  #
  # Runs UI tests across Chromium and Firefox.
  # Runs axe-core accessibility scan.
  # Safari is not available on ubuntu-latest — tested manually.
  # ============================================================
  cross-browser-accessibility-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      matrix:
        browser: [chromium, firefox]
      fail-fast: false   # Run both browsers even if one fails
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pytest-playwright axe-playwright-python

      - name: Install Playwright browsers
        run: playwright install ${{ matrix.browser }} --with-deps

      - name: Start FastAPI app
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Verify app is running
        run: curl -f http://localhost:8000/

      - name: Run cross-browser UI tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest tests/specialized/cross_browser/ \
            --browser ${{ matrix.browser }} \
            -v \
            --tb=short

      - name: Run accessibility tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest tests/specialized/accessibility/ \
            --browser ${{ matrix.browser }} \
            -v \
            --tb=short

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.browser }}
          path: test-results/
          retention-days: 7
